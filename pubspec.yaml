name: zion_os
description: Zion OS - نظام تشغيل ذكي ومتكامل للأمن والاختراق
version: 4.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  glassmorphism: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  network_info_plus: ^5.0.3
  wifi_iot: ^0.3.1
  crypto: ^3.0.3
  permission_handler: ^11.3.1
  local_auth: ^2.1.8
  encrypt: ^5.0.3
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  package_info_plus: ^8.0.0
  fl_chart: ^0.68.0
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.0
  open_file: ^3.4.0
  file_picker: ^8.0.5
  video_player: ^2.9.1
  image_picker: ^1.1.1
  share_plus: ^10.0.0
  vibration: ^1.8.4
  logger: ^2.1.0
  auto_size_text: ^3.0.0
  flutter_slidable: ^3.1.0
  equatable: ^2.0.5
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  easy_localization: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/svg/
    - assets/icons/svg_colors/
    - assets/images/
    - assets/translations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
